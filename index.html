<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>booeb.co</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0f172a;color:#e2e8f0;font-family:system-ui;padding:20px}
       .box{max-width:600px;margin:50px auto;background:#1e293b;padding:30px;border-radius:12px;border:1px solid #334155}
        h1{text-align:center;margin-bottom:30px;color:#3b82f6}
        input{width:100%;padding:12px;margin:10px 0;background:#0f172a;border:1px solid #475569;color:#fff;border-radius:6px}
        button{width:100%;padding:12px;background:#3b82f6;border:none;color:#fff;border-radius:6px;cursor:pointer;font-weight:600;margin:10px 0}
        button:hover{background:#2563eb}
       .result{background:#0f172a;padding:15px;border-radius:6px;margin:15px 0;word-break:break-all}
       .link-list{margin-top:30px}
       .link-item{background:#0f172a;padding:12px;margin:8px 0;border-radius:6px;display:flex;justify-content:space-between;align-items:center}
       .copy{padding:6px 12px;font-size:12px}
        a{color:#60a5fa;text-decoration:none}
    </style>
</head>
<body>
    <div class="box">
        <h1>🔗 booeb.co</h1>

        <input type="url" id="urlInput" placeholder="https://example.com লিংক পেস্ট করুন">
        <input type="text" id="codeInput" placeholder="কাস্টম কোড (খালি রাখলে অটো)">
        <button onclick="createLink()">শর্ট লিংক তৈরি করুন</button>

        <div id="result"></div>

        <div class="link-list">
            <h3>আপনার লিংক সমূহ:</h3>
            <div id="linkList"></div>
        </div>
    </div>

    <script>
        // আপনার 2টা লিংক আগে থেকেই সেট করা
        let links = JSON.parse(localStorage.getItem('booeb_links')) || {
            'bth': 'https://bithilikha.bolt.host/',
            'btl': 'https://bithilikha.lovable.app/'
        };

        // পেজ লোড হলে রিডাইরেক্ট চেক করবে
        window.onload = function(){
            const params = new URLSearchParams(window.location.search);
            const code = params.get('c');

            if(code && links[code]){
                // রিডাইরেক্ট করো
                window.location.href = links[code];
                return;
            }

            // না হলে লিস্ট দেখাও
            showLinks();
        };

        function createLink(){
            const url = document.getElementById('urlInput').value.trim();
            let code = document.getElementById('codeInput').value.trim();

            if(!url){alert('লিংক দিন');return;}

            if(!code){
                code = Math.random().toString(36).substr(2,4);
            }

            if(links[code]){
                alert('এই কোড আগে থেকেই আছে');return;
            }

            links[code] = url;
            localStorage.setItem('booeb_links', JSON.stringify(links));

            const shortUrl = window.location.origin + window.location.pathname + '?c=' + code;
            document.getElementById('result').innerHTML =
                `<div class="result">শর্ট লিংক: <a href="${shortUrl}" target="_blank">${shortUrl}</a>
                <button class="copy" onclick="navigator.clipboard.writeText('${shortUrl}')">কপি</button></div>`;

            document.getElementById('urlInput').value = '';
            document.getElementById('codeInput').value = '';
            showLinks();
        }

        function showLinks(){
            const list = document.getElementById('linkList');
            list.innerHTML = '';

            for(let code in links){
                const shortUrl = window.location.origin + window.location.pathname + '?c=' + code;
                list.innerHTML += `
                    <div class="link-item">
                        <div>
                            <a href="${shortUrl}" target="_blank">booeb.co/?c=${code}</a><br>
                            <small style="color:#94a3b8">${links[code]}</small>
                        </div>
                        <button class="copy" onclick="navigator.clipboard.writeText('${shortUrl}')">কপি</button>
                    </div>
                `;
            }
        }

        function deleteLink(code){
            delete links[code];
            localStorage.setItem('booeb_links', JSON.stringify(links));
            showLinks();
        }
    </script>
</body>
</html>
